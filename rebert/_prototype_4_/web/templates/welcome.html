<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredericka+the+Great&display=swap" rel="stylesheet">
    <!-- set up a couple styles for the headline -->
    <style>
        rebert-h {
            font-family: "Fredericka the Great", serif;
            font-weight: 400;
            font-style: normal;
            font-size: 96px;
        }
        rebert-p {
            font-family: "Fredericka the Great", serif;
            font-weight: 400;
            font-style: normal;
            font-size: 18px;
        }
        #ask_output {
            max-height: min(55vh, 420px);
            overflow-y: auto;
        }
    </style>
    <title>Rebert: LLM Movie Recommender</title>
</head>

<body>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
<script>
    $(document).ready(function() {
        $('#converse').show();

        $('#ask_input').on('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                $('#rebert_form').find('button[type="submit"][formaction="/ask_rebert"]').click();
                return false;
            }
        });
    });
</script>


<!-- HEADLINE Section -->
<div class="container-fluid border-0 bg-light">
  <div class="row" style="height:200px">
    <div class="col-md-2">
      <a href="/">
      <img src="/static/rebert_logo.png" alt="Rebert Logo" width="200" height="200"></a>
    </div>
    <div class="col-md-10">
      <rebert-h>Rebert</rebert-h>
      <p><rebert-p>Your Favorite Movie Recommender</rebert-p></p>
    </div>
  </div>
</div>


<!-- navbar - buttons or menues -->
<div class="row bg-light">
  <div class="col-md-2 border-0">
  </div>
  <div class="col-md-2 d-grid border-0">
    <button type="button" class="btn btn-outline-secondary btn-block" >About</button>
  </div>
  <div class="col-md-2 d-grid border-0">
    <button type="button" class="btn btn-outline-secondary btn-block" >Rate Movies</button>
  </div>
  <div class="col-md-2 d-grid border-0">
    <button type="button" class="btn btn-outline-secondary btn-block" >Sign-up</button>
  </div>
  <div class="col-md-2 d-grid border-0">
    <button type="button" class="btn btn-outline-secondary btn-block" >Sign-in</button>
  </div>
  <div class="col-md-2 border-0">
  </div>
</div>


<!-- spacer - featuring space -->
<nav class="navbar navbar-expand-sm bg-light navbar-dark">
  <div class="container-fluid">
    <span class="navbar-text">&nbsp;</span>
  </div>
</nav>


<!-- PAGE BODY - Chat Section -->
<div id="converse" class="collapse bg-light">
<form method="post" name="rebert_form" id="rebert_form" accept-charset="utf-8">
<!-- Server state variables -->
{% if session_id %}
    <input type="hidden" id="session_id" name="session_id" value="{{session_id}}" />
{% else %}
    <input type="hidden" id="session_id" name="session_id" value="no_session_initialized" />
{% endif %}
    <div class="container mt-0">
      <div class="mb-3 mt-0">
        <label for="rebert_says">Rebert says:</label>
{% if rebert_response %}
        <textarea class="form-control" readonly rows="{{response_rows}}" id="ask_output" name="ask_output">{{rebert_response}}</textarea>
{% else %}
        <textarea class="form-control" readonly rows="5" id="ask_output" name="ask_output">How can I help you today?</textarea>
{% endif %}
      </div>
        <div class="mb-3 mt-3">
          <label for="ask_rebert">Ask:</label>
          <textarea class="form-control" rows="1" id="ask_input" name="question_text"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" formaction="/ask_rebert">Ask Rebert</button>
    </div>
</form>
</div>

<!-- FOOTER Section -->
<div class="row bg-light">
  <div class="col-md-3"><p id='t1'>&nbsp;</p></div>
  <div class="col-md-3"><p id='t2'>&nbsp;</p></div>
  <div class="col-md-3"><p id='t3'>&nbsp;</p></div>
</div>


</body>
</html>
